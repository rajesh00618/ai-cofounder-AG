version: '3.8'
services:
  app:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - AI_MODEL=${AI_MODEL:-meta/llama-4-maverick-17b-128e-instruct}
      - AI_BASE_URL=${AI_BASE_URL:-https://integrate.api.nvidia.com/v1}
    restart: unless-stopped
