services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - AI_MODEL=${AI_MODEL:-meta/llama-4-maverick-17b-128e-instruct}
      - AI_BASE_URL=${AI_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - BACKGROUND_RESEARCH_ENABLED=${BACKGROUND_RESEARCH_ENABLED:-true}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
